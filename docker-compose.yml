services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-steam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-steam}
      POSTGRES_DB: ${POSTGRES_DB:-steam_reviews}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-steam} -d ${POSTGRES_DB:-steam_reviews}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://steam:steam@postgres:5432/steam_reviews}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-change-me}
      ALIYUN_API_KEY: ${ALIYUN_API_KEY:-}
      ALIYUN_MODEL: ${ALIYUN_MODEL:-qwen-plus}
      STEAM_COOKIE_FILE: ${STEAM_COOKIE_FILE:-/app/data/steam_cookie.txt}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
