# Steam 爬虫配置文件

scraper:
  language: schinese       # Steam 商店语言
  currency: us            # 货币代码
  category: "998"         # 分类 ID（998 为游戏）
  max_workers: 20         # 并发数（AsyncIO 模式下建议 15-20，过高可能导致 IP 封禁）

http:
  timeout: 30             # 请求超时（秒）
  max_retries: 3          # 最大重试次数
  min_delay: 0.5          # 请求间隔最小值（秒）
  max_delay: 1.5          # 请求间隔最大值（秒）

output:
  data_dir: ./data        # 数据输出目录
  checkpoint_file: .checkpoint.json  # 断点文件

comments:
  language: schinese      # 评论语言：schinese / english / all
  filter: recent          # 显示顺序：summary / valuable / recent / funny
  review_type: all        # 评论类型：all / positive / negative
  purchase_type: all      # 购买来源：all / steam / non_steam_purchase
  per_page: 100           # 每页评论数量，1-100
  limit: 0                # 每个游戏最多抓取多少条，0 表示尽量抓取全部
  use_review_quality: true # 使用新的评测价值系统

developer_replies:
  cookie_file: ./data/steam_cookie.txt # Steam Community Cookie 抓包文件路径，不要提交真实 Cookie
  response_file: ./data/developer_response.txt # 默认回复文本文件
  result_file: ./data/developer_reply_results.json # 回复结果输出文件
  limit: 0                # 最多回复多少条，0 表示处理输入文件里的全部评论
