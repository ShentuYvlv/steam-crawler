services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://steam:steam@host.docker.internal:5432/steam_reviews}
      REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-change-me}
      ALIYUN_API_KEY: ${ALIYUN_API_KEY:-}
      ALIYUN_MODEL: ${ALIYUN_MODEL:-qwen-plus}
      STEAM_COOKIE_FILE: ${STEAM_COOKIE_FILE:-/app/data/steam_cookie.txt}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./src:/app/src
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  frontend_node_modules:
