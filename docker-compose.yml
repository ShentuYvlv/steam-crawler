services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
        PIP_RETRIES: ${PIP_RETRIES:-10}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://steam:steam@host.docker.internal:5432/steam_reviews}
      REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me}
      ALIYUN_API_KEY: ${ALIYUN_API_KEY:-}
      ALIYUN_MODEL: ${ALIYUN_MODEL:-qwen-plus}
      ALIYUN_BASE_URL: ${ALIYUN_BASE_URL:-https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation}
      STEAM_REPLY_PROXY_URL: ${STEAM_REPLY_PROXY_URL:-}
      STEAM_REPLY_PROXY_DIRECT_FALLBACK: ${STEAM_REPLY_PROXY_DIRECT_FALLBACK:-false}
      OXYLABS_PROXY_ENABLED: ${OXYLABS_PROXY_ENABLED:-false}
      OXYLABS_PROXY_HOST: ${OXYLABS_PROXY_HOST:-dc.oxylabs.io}
      OXYLABS_PROXY_PORT: ${OXYLABS_PROXY_PORT:-8000}
      OXYLABS_PROXY_USERNAME: ${OXYLABS_PROXY_USERNAME:-}
      OXYLABS_PROXY_PASSWORD: ${OXYLABS_PROXY_PASSWORD:-}
      OXYLABS_PROXY_SCHEME: ${OXYLABS_PROXY_SCHEME:-https}
      OXYLABS_PROXY_ROTATING_PORT: ${OXYLABS_PROXY_ROTATING_PORT:-8000}
      OXYLABS_PROXY_SESSION_PORT_MIN: ${OXYLABS_PROXY_SESSION_PORT_MIN:-8001}
      OXYLABS_PROXY_SESSION_PORT_MAX: ${OXYLABS_PROXY_SESSION_PORT_MAX:-63000}
      OXYLABS_PROXY_DIRECT_FALLBACK: ${OXYLABS_PROXY_DIRECT_FALLBACK:-true}
      STEAM_COOKIE_FILE: ${STEAM_COOKIE_FILE:-/app/data/steam_cookie.txt}
      TASK_SCHEDULER_ENABLED: ${TASK_SCHEDULER_ENABLED:-true}
      TASK_SCHEDULER_POLL_SECONDS: ${TASK_SCHEDULER_POLL_SECONDS:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
